[book]
title = "몽골 사진 가이드"
authors = ["ohama"]
language = "ko"
description = "몽골 고비에서 여행 사진·드론 사진·은하수 사진을 찍는 법 — 장비부터 촬영, 후보정까지"
src = "."

[build]
build-dir = "../docs"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ohama/MongolPhoto"
edit-url-template = "https://github.com/ohama/MongolPhoto/edit/main/src/{path}"
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true

[output.html.search]
enable = true
limit-results = 30
boost-title = 2
boost-hierarchy = 1
